pages:
  community:
    disabledWidgets: []
    columns:
      - id: column1
        widgets: [communityRooms, communityActiveHabbos]
      - id: column2
        widgets: [newsPromo, communityTags]
  me:
    disabledWidgets: []
    columns:
      - id: column1
        widgets: [mePersonalInfo, meHotCampaigns, meReferral, meMinimail]
      - id: column2
        widgets: [newsPromo, meRecommendedRooms, meTags]
      - id: column3
        widgets: [adsContainer]
  tags:
    disabledWidgets: []
    columns:
      - id: column1
        widgets: [tagPopular, tagFight, tagMatch]
      - id: column2
        widgets: [tagSearch]
  credits:
    disabledWidgets: []
    columns:
      - id: column1
        widgets: [creditsMethods]
      - id: column2
        widgets: [creditsPurse, creditsInfo]
  pixels:
    disabledWidgets: []
    columns:
      - id: column1
        widgets: [pixelsPrimary]
      - id: column2
        widgets: [pixelsRent, pixelsEffects, pixelsOffers]
  news:
    disabledWidgets: []
    columns:
      - id: column1
        widgets: [newsArchive]
      - id: column2
        widgets: [newsArticle]
      - id: column3
        widgets: [adsContainer]
  events:
    disabledWidgets: []
