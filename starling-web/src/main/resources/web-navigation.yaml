main:
  - key: register
    label: Register now!
    href: /register
    cssId: tab-register-now
    visibleWhenLoggedIn: false
    visibleWhenLoggedOut: true
  - key: me
    label: "{username}"
    href: /me
    selectedKeys: [me]
    visibleWhenLoggedIn: true
    visibleWhenLoggedOut: false
  - key: community
    label: Community
    href: /community
    selectedKeys: [community, news, tags, events, fansites]
    visibleWhenLoggedIn: true
    visibleWhenLoggedOut: true
  - key: credits
    label: Coins
    href: /credits
    selectedKeys: [credits, pixels]
    visibleWhenLoggedIn: true
    visibleWhenLoggedOut: true
  - key: games
    label: Games
    href: /games
    selectedKeys: [games]
    visibleWhenLoggedIn: true
    visibleWhenLoggedOut: true
  - key: housekeeping
    label: Housekeeping
    href: /allseeingeye/hk/
    cssId: tab-register-now
    minimumRank: 6
    visibleWhenLoggedIn: true
    visibleWhenLoggedOut: false

