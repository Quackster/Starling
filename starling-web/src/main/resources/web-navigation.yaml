widgets:
  communityRooms:
    template: habblet/community_rooms
  communityGroups:
    template: habblet/community_groups
  communityActiveHabbos:
    template: habblet/community_active_habbos
  newsPromo:
    template: habblet/community_news_promo
  communityTags:
    template: habblet/community_tags
  mePersonalInfo:
    template: habblet/me_personal_info
  meHotCampaigns:
    template: habblet/me_hot_campaigns
  meMinimail:
    template: habblet/me_minimail
  meTags:
    template: habblet/me_tags
  adsContainer:
    template: habblet/ads_container
  tagPopular:
    template: habblet/tag_popular
  tagFight:
    template: habblet/tag_fight
  tagMatch:
    template: habblet/tag_match
  tagSearch:
    template: habblet/tag_search
  creditsMethods:
    template: habblet/credits_methods
  creditsPurse:
    template: habblet/credits_purse_habblet
  creditsInfo:
    template: habblet/credits_info
  pixelsPrimary:
    template: habblet/pixels_primary
  pixelsRent:
    template: habblet/pixels_rent
  pixelsEffects:
    template: habblet/pixels_effects
  pixelsOffers:
    template: habblet/pixels_offers
  newsArchive:
    template: habblet/news_archive
  newsArticle:
    template: habblet/news_article

pages:
  community:
    columns:
      - id: column1
        widgets: [communityRooms, communityGroups, communityActiveHabbos]
      - id: column2
        widgets: [newsPromo, communityTags]
  me:
    columns:
      - id: column1
        widgets: [mePersonalInfo, meHotCampaigns, meMinimail]
      - id: column2
        widgets: [newsPromo, meTags]
      - id: column3
        widgets: [adsContainer]
  tags:
    columns:
      - id: column1
        widgets: [tagPopular, tagFight, tagMatch]
      - id: column2
        widgets: [tagSearch]
  credits:
    columns:
      - id: column1
        widgets: [creditsMethods]
      - id: column2
        widgets: [creditsPurse, creditsInfo]
  pixels:
    columns:
      - id: column1
        widgets: [pixelsPrimary]
      - id: column2
        widgets: [pixelsRent, pixelsEffects, pixelsOffers]
  news:
    columns:
      - id: column1
        widgets: [newsArchive]
      - id: column2
        widgets: [newsArticle]
      - id: column3
        widgets: [adsContainer]
  events:
    columns:
      - id: column1
        widgets: [newsArchive]
      - id: column2
        widgets: [newsArticle]
      - id: column3
        widgets: [adsContainer]
  fansites:
    columns:
      - id: column1
        widgets: [newsArchive]
      - id: column2
        widgets: [newsArticle]
      - id: column3
        widgets: [adsContainer]

actions:
  guestHotel:
    key: guest-hotel
    label: Enter {siteName} Hotel
    href: /client
    visibleWhenLoggedIn: false
    visibleWhenLoggedOut: true
    target: client
    onclick: HabboClient.openOrFocus(this); return false;
  userHotel:
    key: user-hotel
    label: Enter {siteName}
    href: /client
    visibleWhenLoggedIn: true
    visibleWhenLoggedOut: false
    buttonColor: green
    cssClass: new-button
    target: client
    onclick: HabboClient.openOrFocus(this); return false;
